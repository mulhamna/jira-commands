name: Release Recover

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to recover manually, for example v0.15.3.'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-recover-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate tag vs Cargo.toml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}

      - name: Verify tag matches VERSION file
        run: |
          TAG="${{ inputs.release_tag }}"
          VER=$(cat VERSION | tr -d '[:space:]')
          EXPECTED_TAG="v${VER}"

          echo "Manual tag:      $TAG"
          echo "VERSION file:    $VER  (expected tag: $EXPECTED_TAG)"

          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo ""
            echo "ERROR: Tag '${TAG}' does not match VERSION file '${VER}'."
            exit 1
          fi

      - name: Verify workspace crate versions match
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          CORE_VER=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          MCP_VER=$(grep '^version' crates/jira-mcp/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          BIN_VER=$(grep '^version' crates/jira/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          WS_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')

          if [ "$VER" != "$CORE_VER" ] || [ "$VER" != "$MCP_VER" ] || [ "$VER" != "$BIN_VER" ] || [ "$VER" != "$WS_VER" ]; then
            echo "ERROR: Workspace version mismatch before release!"
            exit 1
          fi

  build-binaries:
    name: Build (${{ matrix.target }})
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: jirac-linux-x86_64
            mcp_artifact: jirac-mcp-linux-x86_64
            archive_artifact: jirac-linux-x86_64.tar.gz
            mcp_archive_artifact: jirac-mcp-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: jirac-linux-aarch64
            mcp_artifact: jirac-mcp-linux-aarch64
            archive_artifact: jirac-linux-aarch64.tar.gz
            mcp_archive_artifact: jirac-mcp-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: jirac-macos-x86_64
            mcp_artifact: jirac-mcp-macos-x86_64
            archive_artifact: jirac-macos-x86_64.tar.gz
            mcp_archive_artifact: jirac-mcp-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: jirac-macos-aarch64
            mcp_artifact: jirac-mcp-macos-aarch64
            archive_artifact: jirac-macos-aarch64.tar.gz
            mcp_archive_artifact: jirac-mcp-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: jirac-windows-x86_64.exe
            mcp_artifact: jirac-mcp-windows-x86_64.exe
            archive_artifact: jirac-windows-x86_64.zip
            mcp_archive_artifact: jirac-mcp-windows-x86_64.zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install Zig + cargo-zigbuild (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          pip3 install ziglang==0.14.0 --break-system-packages
          cargo install cargo-zigbuild --locked
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build (zigbuild — Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo zigbuild --release --target aarch64-unknown-linux-gnu.2.17 -p jira-commands -p jira-mcp
      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p jira-commands -p jira-mcp
      - name: Copy binaries (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/jirac ${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/jirac-mcp ${{ matrix.mcp_artifact }}
      - name: Copy binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/jirac.exe ${{ matrix.artifact }}
          Copy-Item target/${{ matrix.target }}/release/jirac-mcp.exe ${{ matrix.mcp_artifact }}
      - name: Package archives (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/jirac dist/jirac-mcp
          cp ${{ matrix.artifact }} dist/jirac/
          cp ${{ matrix.mcp_artifact }} dist/jirac-mcp/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/jirac/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/jirac-mcp/
          tar -czf ${{ matrix.archive_artifact }} -C dist/jirac .
          tar -czf ${{ matrix.mcp_archive_artifact }} -C dist/jirac-mcp .
      - name: Package archives (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/jirac, dist/jirac-mcp | Out-Null
          Copy-Item ${{ matrix.artifact }} dist/jirac/
          Copy-Item ${{ matrix.mcp_artifact }} dist/jirac-mcp/
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE dist/jirac/
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE dist/jirac-mcp/
          Compress-Archive -Path dist/jirac/* -DestinationPath ${{ matrix.archive_artifact }}
          Compress-Archive -Path dist/jirac-mcp/* -DestinationPath ${{ matrix.mcp_archive_artifact }}
      - name: Upload artifact (jirac)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.archive_artifact }}
          if-no-files-found: error
      - name: Upload artifact (jirac-mcp)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.mcp_artifact }}
          path: |
            ${{ matrix.mcp_artifact }}
            ${{ matrix.mcp_archive_artifact }}
          if-no-files-found: error

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - name: Publish jira-core (skip if already published)
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          if curl -sf "https://index.crates.io/ji/ra/jira-core" | grep -q "\"vers\":\"${VERSION}\""; then
            echo "✓ jira-core v${VERSION} already on crates.io — skipping publish"
          else
            cargo publish -p jira-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
      - name: Wait for jira-core in crates.io sparse index
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          for i in $(seq 1 30); do
            if curl -sf "https://index.crates.io/ji/ra/jira-core" | grep -q "\"vers\":\"${VERSION}\""; then
              exit 0
            fi
            sleep 10
          done
          exit 1
      - name: Publish jira-mcp (skip if already published)
        run: |
          VERSION=$(grep '^version' crates/jira-mcp/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          if curl -sf "https://index.crates.io/ji/ra/jira-mcp" | grep -q "\"vers\":\"${VERSION}\""; then
            echo "✓ jira-mcp v${VERSION} already on crates.io — skipping publish"
          else
            cargo publish -p jira-mcp --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
      - name: Publish jira-commands (skip if already published)
        run: |
          VERSION=$(grep '^version' crates/jira/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          if curl -sf "https://index.crates.io/ji/ra/jira-commands" | grep -q "\"vers\":\"${VERSION}\""; then
            echo "✓ jira-commands v${VERSION} already on crates.io — skipping publish"
          else
            cargo publish -p jira-commands --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi

  create-release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-crates]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          for dir in */; do
            file="${dir%/}"
            sha256sum "$file/$file" >> ../checksums.txt 2>/dev/null || \
            sha256sum "$file/$file.exe" >> ../checksums.txt 2>/dev/null || true
          done
      - name: Upload assets to existing release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.release_tag }}
          append_body: true
          files: |
            artifacts/**/*
            checksums.txt

  refresh-package-manifests:
    name: Refresh package manifests
    runs-on: ubuntu-latest
    needs: create-release
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.vars.outputs.version }}
      sha_macos_arm: ${{ steps.vars.outputs.sha_macos_arm }}
      sha_macos_x86: ${{ steps.vars.outputs.sha_macos_x86 }}
      sha_linux_arm: ${{ steps.vars.outputs.sha_linux_arm }}
      sha_linux_x86: ${{ steps.vars.outputs.sha_linux_x86 }}
      sha_mcp_macos_arm: ${{ steps.vars.outputs.sha_mcp_macos_arm }}
      sha_mcp_macos_x86: ${{ steps.vars.outputs.sha_mcp_macos_x86 }}
      sha_mcp_linux_arm: ${{ steps.vars.outputs.sha_mcp_linux_arm }}
      sha_mcp_linux_x86: ${{ steps.vars.outputs.sha_mcp_linux_x86 }}
      sha_windows_x86: ${{ steps.vars.outputs.sha_windows_x86 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Download checksums from release
        id: vars
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ inputs.release_tag }}"
          VERSION="${RELEASE_TAG#v}"
          RELEASE_DATE=$(date -u +%F)
          curl -fsSL "https://github.com/mulhamna/jira-commands/releases/download/${RELEASE_TAG}/checksums.txt" -o checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

          SHA_MACOS_ARM=$(grep -E '(^|/)jirac-macos-aarch64\.tar\.gz$' checksums.txt | awk '{print $1}')
          SHA_MACOS_X86=$(grep -E '(^|/)jirac-macos-x86_64\.tar\.gz$'  checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM=$(grep -E '(^|/)jirac-linux-aarch64\.tar\.gz$'  checksums.txt | awk '{print $1}')
          SHA_LINUX_X86=$(grep -E '(^|/)jirac-linux-x86_64\.tar\.gz$'   checksums.txt | awk '{print $1}')
          SHA_MCP_MACOS_ARM=$(grep -E '(^|/)jirac-mcp-macos-aarch64\.tar\.gz$' checksums.txt | awk '{print $1}')
          SHA_MCP_MACOS_X86=$(grep -E '(^|/)jirac-mcp-macos-x86_64\.tar\.gz$'  checksums.txt | awk '{print $1}')
          SHA_MCP_LINUX_ARM=$(grep -E '(^|/)jirac-mcp-linux-aarch64\.tar\.gz$'  checksums.txt | awk '{print $1}')
          SHA_MCP_LINUX_X86=$(grep -E '(^|/)jirac-mcp-linux-x86_64\.tar\.gz$'   checksums.txt | awk '{print $1}')
          SHA_WINDOWS_X86=$(grep -E '(^|/)jirac-windows-x86_64\.zip$' checksums.txt | awk '{print $1}')

          test -n "$SHA_MACOS_ARM"
          test -n "$SHA_MACOS_X86"
          test -n "$SHA_LINUX_ARM"
          test -n "$SHA_LINUX_X86"
          test -n "$SHA_MCP_MACOS_ARM"
          test -n "$SHA_MCP_MACOS_X86"
          test -n "$SHA_MCP_LINUX_ARM"
          test -n "$SHA_MCP_LINUX_X86"
          test -n "$SHA_WINDOWS_X86"

          {
            echo "version=$VERSION"
            echo "sha_macos_arm=$SHA_MACOS_ARM"
            echo "sha_macos_x86=$SHA_MACOS_X86"
            echo "sha_linux_arm=$SHA_LINUX_ARM"
            echo "sha_linux_x86=$SHA_LINUX_X86"
            echo "sha_mcp_macos_arm=$SHA_MCP_MACOS_ARM"
            echo "sha_mcp_macos_x86=$SHA_MCP_MACOS_X86"
            echo "sha_mcp_linux_arm=$SHA_MCP_LINUX_ARM"
            echo "sha_mcp_linux_x86=$SHA_MCP_LINUX_X86"
            echo "sha_windows_x86=$SHA_WINDOWS_X86"
            echo "release_date=$RELEASE_DATE"
          } >> "$GITHUB_OUTPUT"

      - name: Refresh release README and install docs
        run: python3 .github/scripts/refresh_release_readme.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          SCOOP_BUCKET: mulhamna/scoop-bucket

      - name: Refresh Winget source manifests
        run: |
          python3 - <<'EOF'
          from pathlib import Path
          import os, re

          version = os.environ['VERSION']
          release_date = os.environ['RELEASE_DATE']
          sha_windows = os.environ['SHA_WINDOWS_X86']

          files = {
              Path('packaging/winget/jirac.yaml'): [
                  (r'(?m)^PackageVersion: .*$', f'PackageVersion: {version}'),
              ],
              Path('packaging/winget/jirac.locale.en-US.yaml'): [
                  (r'(?m)^PackageVersion: .*$', f'PackageVersion: {version}'),
              ],
              Path('packaging/winget/jirac.installer.yaml'): [
                  (r'(?m)^PackageVersion: .*$', f'PackageVersion: {version}'),
                  (r'(?m)^ReleaseDate: .*$', f'ReleaseDate: {release_date}'),
                  (r'(?m)^    InstallerUrl: .*$', f'    InstallerUrl: https://github.com/mulhamna/jira-commands/releases/download/v{version}/jirac-windows-x86_64.zip'),
                  (r'(?m)^    InstallerSha256: .*$', f'    InstallerSha256: {sha_windows}'),
              ],
          }

          for path, replacements in files.items():
              content = path.read_text()
              for pattern, repl in replacements:
                  content, count = re.subn(pattern, repl, content, count=1)
                  if count != 1:
                      raise SystemExit(f'Expected exactly one match for {pattern!r} in {path}')
              path.write_text(content)
              print(f'updated {path}')
          EOF
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          RELEASE_DATE: ${{ steps.vars.outputs.release_date }}
          SHA_WINDOWS_X86: ${{ steps.vars.outputs.sha_windows_x86 }}

      - name: Create manifest refresh pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(packaging): refresh release docs and manifests for v${{ steps.vars.outputs.version }}"
          branch: chore/package-manifests-v${{ steps.vars.outputs.version }}
          delete-branch: true
          title: "chore(packaging): refresh release docs and manifests for v${{ steps.vars.outputs.version }}"
          body: |
            ## Summary

            - refresh README.md and INSTALL.md for v${{ steps.vars.outputs.version }}
            - refresh contributor avatars in the README footer
            - refresh in-repo Winget source manifests for v${{ steps.vars.outputs.version }}
            - update Windows installer URL and SHA256 from the published release
            - keep Microsoft winget-pkgs submission as a manual follow-up

            ## Notes

            - generated by the recovery release workflow after publishing GitHub release assets
            - no Microsoft community repo submission is performed by this workflow
          add-paths: |
            README.md
            INSTALL.md
            packaging/winget/jirac.yaml
            packaging/winget/jirac.locale.en-US.yaml
            packaging/winget/jirac.installer.yaml

  update-scoop-bucket:
    name: Update Scoop bucket manifest
    runs-on: ubuntu-latest
    needs: refresh-package-manifests
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.refresh-package-manifests.outputs.version }}
      SHA_WINDOWS_X86: ${{ needs.refresh-package-manifests.outputs.sha_windows_x86 }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout scoop bucket
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mulhamna/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_PAT }}
          path: bucket

      - name: Verify Scoop manifest exists
        run: test -f bucket/jirac.json

      - name: Update Scoop manifest
        run: python3 .github/scripts/update_scoop_manifest.py

      - name: Commit and push Scoop manifest
        run: |
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jirac.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump jirac to v${VERSION}"
          git push

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: refresh-package-manifests
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.refresh-package-manifests.outputs.version }}
      SHA_MACOS_ARM: ${{ needs.refresh-package-manifests.outputs.sha_macos_arm }}
      SHA_MACOS_X86: ${{ needs.refresh-package-manifests.outputs.sha_macos_x86 }}
      SHA_LINUX_ARM: ${{ needs.refresh-package-manifests.outputs.sha_linux_arm }}
      SHA_LINUX_X86: ${{ needs.refresh-package-manifests.outputs.sha_linux_x86 }}
      SHA_MCP_MACOS_ARM: ${{ needs.refresh-package-manifests.outputs.sha_mcp_macos_arm }}
      SHA_MCP_MACOS_X86: ${{ needs.refresh-package-manifests.outputs.sha_mcp_macos_x86 }}
      SHA_MCP_LINUX_ARM: ${{ needs.refresh-package-manifests.outputs.sha_mcp_linux_arm }}
      SHA_MCP_LINUX_X86: ${{ needs.refresh-package-manifests.outputs.sha_mcp_linux_x86 }}
      SHA_WINDOWS_X86: ${{ needs.refresh-package-manifests.outputs.sha_windows_x86 }}
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mulhamna/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Verify formulas exist
        run: |
          test -f homebrew-tap/Formula/jira-commands.rb
          test -f homebrew-tap/Formula/jira-mcp.rb

      - name: Update formula versions and SHA256
        run: |
          python3 - <<'EOF'
          import re, os

          version      = os.environ["VERSION"]
          formulas = {
              "homebrew-tap/Formula/jira-commands.rb": {
                  "jirac-macos-aarch64": os.environ["SHA_MACOS_ARM"],
                  "jirac-macos-x86_64":  os.environ["SHA_MACOS_X86"],
                  "jirac-linux-aarch64": os.environ["SHA_LINUX_ARM"],
                  "jirac-linux-x86_64":  os.environ["SHA_LINUX_X86"],
              },
              "homebrew-tap/Formula/jira-mcp.rb": {
                  "jirac-mcp-macos-aarch64": os.environ["SHA_MCP_MACOS_ARM"],
                  "jirac-mcp-macos-x86_64":  os.environ["SHA_MCP_MACOS_X86"],
                  "jirac-mcp-linux-aarch64": os.environ["SHA_MCP_LINUX_ARM"],
                  "jirac-mcp-linux-x86_64":  os.environ["SHA_MCP_LINUX_X86"],
              },
          }

          for formula_path, sha_map in formulas.items():
              with open(formula_path) as f:
                  content = f.read()

              content = re.sub(r'version "[^"]+"', f'version "{version}"', content)

              for binary, sha in sha_map.items():
                  content = re.sub(
                      rf'(url "[^"]*{re.escape(binary)}[^"]*"\n\s+sha256 ")[^"]+"',
                      rf'\g<1>{sha}"',
                      content,
                  )

              with open(formula_path, "w") as f:
                  f.write(content)

              print(f"Updated {formula_path} to v{version}")
          EOF

      - name: Commit and push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jira-commands.rb Formula/jira-mcp.rb
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump jira-commands to v${VERSION}"
          git push
