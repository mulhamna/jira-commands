name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      rust: ${{ steps.filter.outputs.rust }}
      plugin: ${{ steps.filter.outputs.plugin }}
      docs: ${{ steps.filter.outputs.docs }}
      release: ${{ steps.filter.outputs.release }}
      workspace_meta: ${{ steps.filter.outputs.workspace_meta }}
      any_code: ${{ steps.filter.outputs.any_code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'crates/**'
            plugin:
              - 'plugin/**'
            docs:
              - 'README.md'
              - 'docs/**'
              - '.github/PULL_REQUEST_TEMPLATE.md'
            release:
              - 'release-please-config.json'
              - '.release-please-manifest.json'
              - 'VERSION'
              - 'CHANGELOG.md'
            workspace_meta:
              - '.github/CODEOWNERS'
              - '.github/dependabot.yml'
              - 'install.sh'
              - 'SECURITY.md'
          predicate-quantifier: 'some'

      - id: any_code
        run: |
          if [ "${{ steps.filter.outputs.workflows }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.rust }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.plugin }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.release }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.workspace_meta }}" = 'true' ]; then
            echo "any_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_code=false" >> "$GITHUB_OUTPUT"
          fi

  docs-check:
    name: Docs & version check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_code == 'true' || needs.changes.outputs.docs == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check version consistency (jira-core == jira-mcp == jira-commands == plugin)
        run: |
          CORE_VER=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          MCP_VER=$(grep '^version' crates/jira-mcp/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          BIN_VER=$(grep '^version' crates/jira/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          PLUGIN_VER=$(jq -r '.version' plugin/.claude-plugin/plugin.json)

          echo "jira-core:     $CORE_VER"
          echo "jira-mcp:      $MCP_VER"
          echo "jira-commands: $BIN_VER"
          echo "plugin:        $PLUGIN_VER"

          if [ "$CORE_VER" != "$MCP_VER" ] || [ "$CORE_VER" != "$BIN_VER" ] || [ "$CORE_VER" != "$PLUGIN_VER" ]; then
            echo ""
            echo "ERROR: Version mismatch! All four must be equal."
            exit 1
          fi

      - name: Check CHANGELOG entry exists for current version
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          if grep -qF "[${VERSION}]" CHANGELOG.md 2>/dev/null \
            || grep -qF "[${VERSION}]" crates/jira-core/CHANGELOG.md 2>/dev/null \
            || grep -qF "[${VERSION}]" crates/jira/CHANGELOG.md 2>/dev/null; then
            echo "✓ CHANGELOG entry found for v${VERSION}"
          else
            echo "WARNING: No CHANGELOG entry found for v${VERSION} in any location."
          fi

      - name: Check README.md jira-core version is up to date
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          if ! grep -qF "jira-core = \"${MAJOR_MINOR}\"" README.md; then
            echo "WARNING: README.md library example may reference an old jira-core version."
          fi

      - name: Install Rust stable (for dry-run publish check)
        if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.release == 'true' || needs.changes.outputs.workflows == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.release == 'true' || needs.changes.outputs.workflows == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo publish --dry-run (jira-core)
        if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.release == 'true' || needs.changes.outputs.workflows == 'true'
        run: cargo publish --dry-run -p jira-core

  check:
    name: Rust check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all

  plugin-check:
    name: Plugin structure check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.plugin == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate plugin metadata and skills
        run: |
          jq -e '.name and .version and .description and .repository' plugin/.claude-plugin/plugin.json >/dev/null
          test -d plugin/skills
          count=$(find plugin/skills -mindepth 2 -maxdepth 2 -name SKILL.md | wc -l | tr -d ' ')
          if [ "$count" -lt 1 ]; then
            echo "ERROR: expected at least one plugin skill"
            exit 1
          fi
          find plugin/skills -mindepth 2 -maxdepth 2 -name SKILL.md -print0 | while IFS= read -r -d '' file; do
            grep -q '^---' "$file" || { echo "Missing frontmatter: $file"; exit 1; }
            grep -q '^description:' "$file" || { echo "Missing description in $file"; exit 1; }
          done

  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true' || needs.changes.outputs.release == 'true' || github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit
