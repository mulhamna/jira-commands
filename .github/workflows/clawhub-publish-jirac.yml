name: ClawHub Publish jirac

on:
  push:
    branches: [main]
    paths:
      - 'clawhub/jirac/**'

concurrency:
  group: clawhub-publish-jirac
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Validate and publish ClawHub skill
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SKILL_PATH: clawhub/jirac
      SKILL_SLUG: jirac
      SKILL_NAME: jirac
      SKILL_VERSION_FILE: clawhub/jirac/VERSION
      DEFAULT_CHANGELOG: Update ClawHub jirac skill metadata and docs
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Validate auth
        run: |
          test -n "${{ secrets.CLAWHUB_TOKEN }}"
          clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}" --no-browser
          clawhub whoami

      - name: Validate skill path
        run: |
          test -d "$SKILL_PATH"
          test -f "$SKILL_PATH/SKILL.md"
          test -f "$SKILL_VERSION_FILE"

      - name: Dry-run sync
        run: clawhub sync --dry-run --all --root "$SKILL_PATH/.."

      - name: Resolve publish metadata
        id: publish_meta
        shell: bash
        run: |
          set -euo pipefail

          RANGE="HEAD~1..HEAD"
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGELOG=$(git log --format=%s ${RANGE} -- "$SKILL_PATH" | sed '/^$/d')
          else
            CHANGELOG=""
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="$DEFAULT_CHANGELOG"
          fi

          VERSION=$(tr -d '[:space:]' < "$SKILL_VERSION_FILE")
          echo "Publish version: $VERSION"

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version in $SKILL_VERSION_FILE: $VERSION"
            exit 1
          fi

          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Publish skill
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Publish attempt $attempt/3"

            if clawhub publish "$SKILL_PATH" \
              --slug "$SKILL_SLUG" \
              --name "$SKILL_NAME" \
              --version "${{ steps.publish_meta.outputs.version }}" \
              --changelog "${{ steps.publish_meta.outputs.changelog }}"; then
              echo "Publish succeeded on attempt $attempt"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              backoff=$((attempt * 15))
              echo "Publish failed, retrying in ${backoff}s..."
              sleep "$backoff"
            fi
          done

          echo "Publish failed after 3 attempts."
          exit 1
