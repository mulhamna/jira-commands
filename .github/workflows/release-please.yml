name: Release Please

# ── HOW THIS WORKS ────────────────────────────────────────────────────────────
# 1. Every push to main is analyzed for Conventional Commits.
# 2. release-please creates/updates a "Release PR" that:
#      - Bumps the Rust workspace version across all member crates
#      - Updates the root CHANGELOG.md
#      - Leaves Claude plugin versioning to its separate release lane under plugin/
# 3. When you (the owner) merge the Release PR:
#      - release-please pushes a git tag (e.g. v0.5.0)
#      - That tag triggers release.yml → builds binaries, publishes to crates.io
#
# You NEVER need to manually bump versions, update CHANGELOG, or push tags.
# ─────────────────────────────────────────────────────────────────────────────
#
# ⚠️  REQUIRED SETUP: Personal Access Token (PAT)
# ─────────────────────────────────────────────────────────────────────────────
# The default GITHUB_TOKEN cannot trigger other workflows (GitHub safety rule).
# Without a PAT, release-please creates the tag but release.yml never runs.
#
# One-time setup:
#   1. Go to: https://github.com/settings/personal-access-tokens/new
#   2. Create a fine-grained PAT scoped to this repo with these permissions:
#         - Contents: Read and write
#         - Pull requests: Read and write
#   3. Add it as repo secret: Settings → Secrets → Actions → New secret
#         Name:  RELEASE_PLEASE_TOKEN
#         Value: <paste the PAT>
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  sync-npm-version:
    name: Sync npm package version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Sync npm version from VERSION
        id: sync
        run: |
          node scripts/sync-npm-version.mjs
          if git diff --quiet -- packaging/npm/package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit synced npm package version
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packaging/npm/package.json
          git commit -m "chore(npm): sync package version with VERSION"
          git push

  release-please:
    name: Release Please
    needs: sync-npm-version
    if: needs.sync-npm-version.outputs.changed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          fetch-depth: 0

      - name: Sync npm package version on release PR branch
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=$(gh pr list             --repo "$GITHUB_REPOSITORY"             --state open             --base main             --head release-please--branches--main--components--jira-commands             --json headRefName             --jq '.[0].headRefName')

          if [ -z "${BRANCH:-}" ] || [ "$BRANCH" = "null" ]; then
            echo "No open release-please branch found; skipping npm sync."
            exit 0
          fi

          git fetch origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"
          node scripts/sync-npm-version.mjs

          if git diff --quiet -- packaging/npm/package.json; then
            echo "packaging/npm/package.json already matches VERSION"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/npm/package.json
          git commit -m "chore(npm): sync package version with VERSION"
          git push origin "HEAD:$BRANCH"
