name: CI

# ── SHA PINNING REMINDER ─────────────────────────────────────────────────────
# All actions below use version tags. For supply-chain hardening, pin every
# action to its full commit SHA. Dependabot (see dependabot.yml) will keep
# the SHA pins up-to-date automatically via weekly PRs.
#
# One-time pin (run once, then commit):
#   npx pin-github-action@latest .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI runs for the same ref (saves minutes on fast pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal read-only permissions for the whole workflow.
# Individual jobs that need more (e.g. security-events) declare it themselves.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Docs & version consistency ──────────────────────────────────────────
  docs-check:
    name: Docs & version check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check version consistency (jira-core == jira-commands == plugin)
        run: |
          CORE_VER=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          BIN_VER=$(grep '^version' crates/jira/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          PLUGIN_VER=$(jq -r '.version' plugin/.claude-plugin/plugin.json)

          echo "jira-core:     $CORE_VER"
          echo "jira-commands: $BIN_VER"
          echo "plugin:        $PLUGIN_VER"

          if [ "$CORE_VER" != "$BIN_VER" ] || [ "$CORE_VER" != "$PLUGIN_VER" ]; then
            echo ""
            echo "ERROR: Version mismatch! All three must be equal."
            echo "  Fix: bump version in crates/jira-core/Cargo.toml,"
            echo "       crates/jira/Cargo.toml (package + jira-core dep),"
            echo "       and plugin/.claude-plugin/plugin.json"
            exit 1
          fi

      - name: Check CHANGELOG entry exists for current version
        # release-please writes per-package CHANGELOGs. Accept an entry in any
        # of: root CHANGELOG.md, jira-core/CHANGELOG.md, or jira/CHANGELOG.md.
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          if grep -qF "[${VERSION}]" CHANGELOG.md 2>/dev/null \
            || grep -qF "[${VERSION}]" crates/jira-core/CHANGELOG.md 2>/dev/null \
            || grep -qF "[${VERSION}]" crates/jira/CHANGELOG.md 2>/dev/null; then
            echo "✓ CHANGELOG entry found for v${VERSION}"
          else
            echo "WARNING: No CHANGELOG entry found for v${VERSION} in any location."
            echo "  release-please will create per-package CHANGELOGs automatically."
          fi

      - name: Check README.md jira-core version is up to date
        # WARNING only — README version lags on patch bumps by design.
        # On minor/major bumps, update README.md manually before merging.
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/^version = "\([^"]*\)".*/\1/')
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          if ! grep -qF "jira-core = \"${MAJOR_MINOR}\"" README.md; then
            echo "WARNING: README.md library example may reference an old jira-core version."
            echo "  Consider updating 'jira-core = \"..\"' to \"${MAJOR_MINOR}\" in README."
          fi

      - name: Install Rust stable (for dry-run publish check)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Dry-run only jira-core (no workspace deps — always resolvable from crates.io).
      # jira-commands is intentionally skipped: it depends on jira-core at the *new*
      # version which isn't published yet, so cargo would fail to resolve it from
      # crates.io. The release workflow handles jira-commands after jira-core is live.
      - name: cargo publish --dry-run (jira-core)
        run: cargo publish --dry-run -p jira-core

  # ── 2. Build, lint, test ───────────────────────────────────────────────────
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all

  # ── 3. Security audit ──────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit
